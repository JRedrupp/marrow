name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bench-linux-x86_64:
    name: bench (linux, x86_64)
    runs-on: ubuntu-latest
    env:
      MODULAR_HOME: "/home/runner/.modular"
      FORCE_COLOR: "1"
      PYTEST_ADDOPTS: "--color=yes"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          frozen: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - uses: actions/cache@v4
        with:
          path: .pixi/envs/bench/**/.mojo_cache
          key: mojo-cache-bench-${{ runner.os }}-${{ hashFiles('pixi.lock', '**/*.mojo') }}
          restore-keys: mojo-cache-bench-${{ runner.os }}-

      - name: Run benchmarks
        run: bash scripts/run_benchmarks.sh

      - name: Verify benchmark results were recorded
        run: |
          COMMIT="$(git rev-parse HEAD)"
          RESULT_FILE="results/${COMMIT}.json"
          if [ ! -f "$RESULT_FILE" ]; then
            echo "::error::benchmark result file $RESULT_FILE not found — run_benchmarks.sh did not complete"
            exit 1
          fi
          COUNT=$(python3 -c "import json, sys; print(len(json.load(open('$RESULT_FILE'))['results']))")
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::benchmark result file $RESULT_FILE contains zero entries"
            exit 1
          fi
          echo "OK: $COUNT benchmark entries recorded in $RESULT_FILE"

      - name: Checkout gh-pages
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-out

      - name: Copy result to gh-pages
        if: github.ref == 'refs/heads/main'
        run: |
          COMMIT="$(git rev-parse HEAD)"
          mkdir -p gh-pages-out/results
          cp results/${COMMIT}.json gh-pages-out/results/${COMMIT}.json

      - name: Generate report
        if: github.ref == 'refs/heads/main'
        working-directory: gh-pages-out
        run: python scripts/generate_report.py

      - name: Push updated dashboard
        if: github.ref == 'refs/heads/main'
        working-directory: gh-pages-out
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/data.json results/
          git diff --cached --quiet || git commit -m "perf: update benchmark dashboard [skip ci]"
          git push origin gh-pages
